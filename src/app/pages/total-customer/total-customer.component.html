<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4 md:gap-6">
  <div
    class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6"
  >
    <div
      class="flex items-center justify-center bg-gray-100 rounded-xl dark:bg-gray-800 text-gray-800 dark:text-white"
      [innerHTML]="icons.groupIcon | safeHtml"
      style="width: 30px;"
    ></div>
    <div class="flex items-end justify-between mt-5">
      <div>
        <span class="text-sm text-gray-500 dark:text-gray-400"
          >Tổng Khách hàng</span
        >
        <h4
          class="mt-2 font-bold text-gray-800 text-title-sm dark:text-white/90"
        >
          {{ totalCustomers | number }}
        </h4>
      </div>
    </div>
  </div>
  <div
    class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6"
  >
    <div
      class="flex items-center justify-center bg-gray-100 rounded-xl dark:bg-gray-800 text-gray-800 dark:text-white"
      [innerHTML]="icons.boxIconLine | safeHtml"
      style="width: 30px;"
    ></div>
    <div class="flex items-end justify-between mt-5">
      <div>
        <span class="text-sm text-gray-500 dark:text-gray-400"
          >Cần thay lõi tháng ({{ currentMonthStr }})</span
        >
        <h4
          class="mt-2 font-bold text-gray-800 text-title-sm dark:text-white/90"
          style="color: red;"
        >
          {{ maintenanceCurrentMonth | number }}
        </h4>
      </div>
    </div>
  </div>
  <div
    class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6"
  >
    <div
      class="flex items-center justify-center bg-gray-100 rounded-xl dark:bg-gray-800 text-gray-800 dark:text-white"
      [innerHTML]="icons.boxIconLine | safeHtml"
      style="width: 30px;"
    ></div>
    <div class="flex items-end justify-between mt-5">
      <div>
        <span class="text-sm text-gray-500 dark:text-gray-400"
          >Cần thay lõi tháng sau ( {{ nextMonthStr }} )</span
        >
        <h4
          class="mt-2 font-bold text-gray-800 text-title-sm dark:text-white/90"
          style="color: orange;"
        >
          {{ maintenanceNextMonth | number }}
        </h4>
      </div>
    </div>
  </div>
  <div
    class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6"
  >
    <div
      class="flex items-center justify-center bg-gray-100 rounded-xl dark:bg-gray-800 text-gray-800 dark:text-white"
      [innerHTML]="icons.moneyIcon | safeHtml"
      style="width: 30px;"
    ></div>
    <div class="flex items-end justify-between mt-5">
      <div>
        <span class="text-sm text-gray-500 dark:text-gray-400"
          >Tổng doanh thu trong tháng</span
        >
        <h4
        style="color: green;"
          class="mt-2 font-bold text-gray-800 text-title-sm dark:text-white/90"
        >
          {{ totalRevenue | number : "1.0-0" }} đ
        </h4>
      </div>
    </div>
  </div>
</div>
